plan_id: service_persistence_audit
objective: Determine which agent-platform services use PostgreSQL vs in-memory data
focus_area: agent-platform/services
created_at: "2026-04-18T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - **auth** and **memory** are fully DB-backed (SQLAlchemy async, Depends(get_db)).
  - **billing**, **market**, and **host** are 100% in-memory (dict/list singletons, no DB imports).
  - **scheduler** is a pure proxy layer (no data store of its own), with a trivial in-memory `_tasks` dict for task status stubs.
  - **gateway** is a pure reverse-proxy (JWT validation + forwarding to scheduler), zero data persistence.
  - Shared models.py defines 7 DB tables (Organization, User, ApiKey, AgentInstance, UsageRecord, MemoryAsset, BillingRule, TaskRecord) — only auth+memory use them currently.
  - billing and market have NO schemas.py files; host uses `CreateAgentRequest` from shared/api_mapping.py.

research_metadata:
  methodology: "Direct file reads of all service.py, main.py, and API route files across 7 service directories; grep for get_db/AsyncSession/Depends patterns; verification of shared/models.py ORM definitions"
  scope: "All 7 services under agent-platform/services/ + shared models"
  confidence: high
  coverage: 100
  decision_blockers: 0
  research_blockers: 0

