open_questions:
- question: Should the host service's OrchestratorClient be refactored to use platform PostgreSQL (AgentInstance table) instead of its own SQLite?
  context: "HostService creates a temp directory with instances.db. This data is ephemeral and not shared with other services. The AgentInstance ORM model exists in shared/models.py but is unused."
  type: decision_blocker
  affects: [host_hardening]
- question: Should billing pricing come from the BillingRule table instead of hardcoded _calc_cost()?
  context: "BillingRule ORM model exists with price_per_input_token and price_per_output_token columns, but billing service ignores it and uses a static formula."
  type: decision_blocker
  affects: [billing_hardening]
- question: Should market data be mutable (admin CRUD) or remain read-only catalog?
  context: "Market currently has no write endpoints and uses hardcoded seed data. If admin CRUD is needed, a DB table is required."
  type: decision_blocker
  affects: [market_hardening]
- question: Does the scheduler need real task persistence (TaskRecord table)?
  context: "TaskRecord ORM model exists with scheduling fields (scheduled_at, priority, retry_count). Scheduler currently just proxies and has a trivial _tasks dict stub."
  type: nice_to_know
  affects: [scheduler_hardening]

gaps:
- area: billing DB migration
  description: "Billing service uses in-memory list[dict] with hardcoded SEED_RECORDS and hardcoded pricing. UsageRecord and BillingRule ORM models exist in shared/models.py but are completely unused by billing service."
  impact: decision_blocker
  affects: [billing_hardening]
- area: market DB migration
  description: "Market service uses in-memory lists (_templates, _skills, _mcps) populated by _seed(). No DB models exist yet for templates/skills/mcps — they would need to be added to shared/models.py."
  impact: decision_blocker
  affects: [market_hardening]
- area: host DB integration
  description: "Host service delegates to OrchestratorClient which uses its own SQLite (instances.db in temp dir). The AgentInstance ORM model exists but is not used. Host data is ephemeral and isolated."
  impact: decision_blocker
  affects: [host_hardening]
- area: scheduler task persistence
  description: "Scheduler has no real task queue — just a proxy + trivial in-memory _tasks dict stub. TaskRecord ORM model exists with full scheduling schema but is unused."
  impact: nice_to_know
  affects: [scheduler_hardening]
- area: billing schemas
  description: "billing and market have no schemas.py files. Host uses CreateAgentRequest from shared/api_mapping.py. No input validation on billing request params."
  impact: research_blocker
  affects: [billing_hardening, market_hardening]
