patterns_found:
- category: architecture
  pattern: Global singleton service (module-level _service variable)
  description: "billing, market, host all use a module-level `_service: XxxService | None` with a `get_service()` accessor. No DI, no Depends(get_db)."
  examples:
  - file: agent-platform/services/billing/src/agentp_billing/service.py
    location: "service.py:142-152"
    snippet: "_service: BillingService | None = None\ndef init_billing(...): global _service; _service = BillingService(...)\ndef get_billing_service() -> BillingService: ..."
  - file: agent-platform/services/market/src/agentp_market/api/v1/templates.py
    location: "templates.py:13-22"
    snippet: "_service: MarketService | None = None\ndef get_service() -> MarketService: global _service; ..."
  - file: agent-platform/services/host/src/agentp_host/api/v1/agents.py
    location: "agents.py:13-20"
    snippet: "_service: HostService | None = None\ndef get_service() -> HostService: ..."
  prevalence: common

- category: architecture
  pattern: Proxy layer pattern (scheduler + gateway)
  description: "scheduler is a pure HTTP proxy routing /api/v1/* to backend /internal/* endpoints. gateway is a pure reverse-proxy adding JWT auth before forwarding everything to scheduler."
  examples:
  - file: agent-platform/services/scheduler/src/agentp_scheduler/proxy.py
    location: "proxy.py:10-21"
    snippet: "ROUTE_TABLE: dict[str, tuple[str, str]] = {\"/api/v1/auth\": (AUTH_URL, \"/internal/auth\"), ...}"
  - file: agent-platform/services/gateway/src/agentp_gateway/middleware.py
    location: "middleware.py:67-70"
    snippet: "return await self._forward_to_scheduler(request, request_id, payload)"
  prevalence: common

- category: architecture
  pattern: Hardcoded seed data instead of DB
  description: "billing has SEED_RECORDS (5 usage dicts), market has _seed() (3 templates, 2 skills, 1 MCP). Both are initialized at startup and never written to."
  examples:
  - file: agent-platform/services/billing/src/agentp_billing/service.py
    location: "service.py:11-51"
    snippet: "SEED_RECORDS = [{\"id\": \"rec-001\", \"time\": \"2026-04-15T10:30:00Z\", ...}, ...]"
  - file: agent-platform/services/market/src/agentp_market/service.py
    location: "service.py:97-133"
    snippet: "def _seed(self) -> None: self._templates = [{\"id\": \"tpl-001\", ...}]"
  prevalence: common

- category: architecture
  pattern: Host uses OrchestratorClient with its own SQLite
  description: "HostService wraps agent-orchestrator's OrchestratorClient which uses a local SQLite file (instances.db) in a temp directory. This is completely separate from the platform PostgreSQL database."
  examples:
  - file: agent-platform/services/host/src/agentp_host/service.py
    location: "service.py:14"
    snippet: "self.client = OrchestratorClient(allowed_roots=[self.temp_dir], runtime=\"noop\", db_path=str(Path(self.temp_dir) / \"instances.db\"))"
  prevalence: rare

related_architecture:
  components_relevant_to_domain:
  - component: shared/models.py
    responsibility: Defines 8 SQLAlchemy ORM tables (Organization, User, ApiKey, AgentInstance, UsageRecord, MemoryAsset, BillingRule, TaskRecord)
    location: agent-platform/services/shared/src/agentp_shared/models.py
    relationship_to_domain: "All services should ideally use these models. Currently only auth (Organization, User, ApiKey) and memory (MemoryAsset) do."
  - component: agent-orchestrator (OrchestratorClient)
    responsibility: Manages agent instance lifecycle via SDK
    location: agent-platform/agent-orchestrator/src/
    relationship_to_domain: "host service delegates to this; it uses its own SQLite, not platform DB"
  interfaces_used_by_domain:
  - interface: Depends(get_db) → AsyncSession
    location: agent-platform/services/shared/src/agentp_shared/db.py
    usage_pattern: "Used by auth and memory. NOT used by billing, market, host, scheduler, gateway."
  data_flow_involving_domain: |
    Client → Gateway (JWT auth) → Scheduler (proxy) → Backend Service → PostgreSQL
    billing/market break this flow: they don't touch PostgreSQL at all.
    host breaks differently: it writes to OrchestratorClient's own SQLite instead.
  key_relationships_to_domain:
  - from: gateway
    to: scheduler
    relationship: forwards all requests via HTTP
  - from: scheduler
    to: auth, billing, market, memory, host
    relationship: proxies /api/v1/* to /internal/* via HTTP
  - from: host
    to: agent-orchestrator
    relationship: composes OrchestratorClient for instance CRUD

