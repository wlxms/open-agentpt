    title: "SQLite 持久化基础设施 — shared/db.py 改造"
    description: |
      修改 shared/db.py 和 shared/config.py 支持 SQLite：
      1. config.py: DatabaseSettings.url 默认值改为 sqlite+aiosqlite:///./ohent_dev.db
      2. db.py: engine 创建时移除 pool_size（SQLite 不支持），添加 connect_args={"check_same_thread": False, "timeout": 30}
      3. db.py: 添加 WAL 模式支持（PRAGMA journal_mode=WAL）
      4. db.py: 添加 init_db() 函数用于创建所有注册的表
      5. db.py: 添加 override_engine(url) 函数支持测试时切换数据库 URL
      6. db.py: engine 创建改为延迟初始化（函数 get_engine()），避免模块级导入触发连接
