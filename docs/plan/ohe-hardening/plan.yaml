plan_id: ohe-hardening
objective: "OpenHarness Enterprise 基础加固 — 将 25 个已实现端点从内存存储迁移到 SQLite 持久化，添加完整输入验证和边界错误测试，实现全链路冒烟覆盖"
created_at: "2026-04-16T00:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 14
  risk_score: low

tldr: |
  将 8 个微服务从内存 dict 迁移到 SQLite (aiosqlite) 持久化。
  为 Auth/Memory/Market/Billing 添加输入验证加固（空值、超长、注入、边界分页）。
  全链路冒烟测试覆盖 Gateway → 每个后端服务的完整链路。
  不引入新功能，纯生产化加固。

open_questions:
  - "Host 服务使用 SDK 的 SQLite 实例库 (instances.db)，是否也需要迁移到统一 shared 的 SQLite？"
  - "Gateway 的 JWT 中间件是否有独立的 token 黑名单存储需求（Redis）？"
  - "[已决策] 使用 SQLite 替代 PostgreSQL（Podman 不可用），后续可迁移回 PG"
  - "[已决策] Memory path pattern 拒绝 '..' 路径穿越序列（service 层验证）"

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "SQLite 在并发写入时出现 database locked 错误"
      likelihood: medium
      impact: medium
      mitigation: "SQLite WAL 模式 + 设置合理的 timeout，单机开发环境并发量低"
    - scenario: "aiosqlite 与 SQLAlchemy async session 的兼容性问题"
      likelihood: low
      impact: high
      mitigation: "Wave 1 首先验证 engine 创建和 session 工厂，失败则回退到同步 sqlite3"
    - scenario: "现有 123 个测试在 shared 库修改 URL 默认值后失败"
      likelihood: low
      impact: medium
      mitigation: "仅在 shared config.py 修改默认值，各服务可通过环境变量覆盖；测试使用隔离 fixture"
  assumptions:
    - "Podman 不可用，SQLite 是唯一可行的数据库方案"
    - "fakeredis 仅用于测试，生产环境 Redis 可后续接入"
    - "所有服务的 Pydantic schema 验证在 API 层完成，service 层依赖 schema 校验后的数据"
    - "Host 服务使用 SDK 自带 SQLite，不在本次加固范围（SDK 内部事务）"
    - "Gateway 和 Scheduler 是纯代理/转发服务，无需独立持久化"

implementation_specification:
  code_structure: |
    每个 service 新增 models.py (SQLAlchemy ORM)。
    shared/db.py 修改为支持 SQLite + WAL 模式。
    shared/redis.py 修改为支持 fakeredis 回退。
    各 service 的 main.py lifespan 中初始化数据库表 + seed 数据。
    各 service 的 API layer 添加 Pydantic 验证。
  affected_areas:
    - "services/shared/src/ohent_shared/config.py — DatabaseSettings.url 默认值改为 SQLite"
    - "services/shared/src/ohent_shared/db.py — SQLite WAL 模式 + pool 参数适配"
    - "services/shared/src/ohent_shared/redis.py — fakeredis 回退支持"
    - "services/shared/pyproject.toml — 添加 aiosqlite, fakeredis 依赖"
    - "services/auth/src/ohent_auth/ — models.py + service.py 重写 + schemas 验证加固 + API 验证"
    - "services/memory/src/ohent_memory/ — models.py + service.py 重写 + schemas 验证加固 + API 验证"
    - "services/market/src/ohent_market/ — models.py + service.py 重写 + API 验证"
    - "services/billing/src/ohent_billing/ — models.py + service.py 重写 + API 验证"
    - "tests/ — 所有服务的边界测试 + 冒烟测试"
  component_details:
    - component: "shared/db.py"
      responsibility: "提供 async SQLAlchemy engine/session，支持 SQLite WAL 模式"
      interfaces:
        - "engine: AsyncEngine"
        - "async_session_factory: async_sessionmaker"
        - "get_db(): AsyncSession generator"
        - "init_db(): 创建所有注册表"
    - component: "shared/redis.py"
      responsibility: "提供 Redis 客户端，测试环境回退 fakeredis"
      interfaces:
        - "get_redis(): Redis"
        - "close_redis(): None"
    - component: "shared/schemas.py"
      responsibility: "通用分页、用户信息等共享 Pydantic 模型"
      interfaces:
        - "PaginatedQuery(page, page_size)"
        - "UserInfo(id, name, role, org_id, permissions)"
    - component: "auth/models.py"
      responsibility: "ApiKey ORM 模型（id, key_hash, user_id, name, role, org_id, permissions, created_at, is_active）"
      interfaces:
        - "ApiKey class (SQLAlchemy model)"
    - component: "memory/models.py"
      responsibility: "Asset ORM 模型（id, path, name, content, content_type, created_at, updated_at）"
      interfaces:
        - "Asset class (SQLAlchemy model)"
    - component: "market/models.py"
      responsibility: "Template/Skill/Mcp ORM 模型"
      interfaces:
        - "Template, Skill, Mcp classes (SQLAlchemy models)"
    - component: "billing/models.py"
      responsibility: "UsageRecord ORM 模型（id, instance_id, model, input_tokens, output_tokens, cost, created_at）"
      interfaces:
        - "UsageRecord class (SQLAlchemy model)"
  dependencies:
    - component: "shared/db.py"
      relationship: "所有 service 依赖 shared 提供的 get_db() 获取数据库 session"
    - component: "shared/redis.py"
      relationship: "所有 service 可选依赖 get_redis()（本次仅基础设施准备）"
    - component: "auth/models.py → memory/models.py → market/models.py → billing/models.py"
      relationship: "各服务 models 依赖 shared/db.py 的 Base 类"
  integration_points:
    - "shared/pyproject.toml 添加 aiosqlite, fakeredis 依赖"
    - "各 service main.py lifespan 中调用 init_db() 创建表 + seed 数据"
    - "各 service API layer 使用 Pydantic schema 做输入验证"
    - "测试文件通过 pytest fixture 注入内存 SQLite (sqlite+aiosqlite:///)"

