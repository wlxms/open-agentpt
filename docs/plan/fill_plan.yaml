  # ============================================================================
  # P8: EVENT BUS INTEGRATION (outlined)
  # ============================================================================
  - id: M8-eventbus-integration
    phase: P8
    name: "Event Bus Integration"
    description: "Activate EventBus across all 8 services — publish lifecycle events, subscribe to relevant topics, verify cross-service event flow"
    agent: gem-implementer
    tasks:
      - id: T8.1
        name: "EventBus initialization in all service lifespans"
        tdd:
          test: |
            Write tests in tests/test_eventbus_init.py:
            - Each service (gateway, auth, host, scheduler, memory, market, billing) initializes EventBus in lifespan
            - EventBus creates Redis consumer groups on startup (group name = service name)
            - Service shutdown gracefully closes EventBus connection
            - Verify consumer groups exist in Redis: XINFO GROUPS event:<topic>
          implement: |
            For each service's main.py lifespan handler:
            - Get Redis connection from shared.redis.get_redis()
            - Create EventBus(redis) instance
            - Register topic subscribers via bus.subscribe(topic, handler)
            - Store bus in app.state for access in routes
            - On shutdown: await bus.close()
            Topic subscriptions per service:
            - auth: permission.changed, user.created
            - host: (publishes only) agent.created, agent.destroyed, agent.status_changed, agent.usage
            - scheduler: agent.created, agent.destroyed, agent.usage, billing.alert, approval.requested
            - billing: agent.usage, agent.created
            - market: (publishes only) template.published
            - gateway: (publishes only) audit.request
          verify: "pytest tests/test_eventbus_init.py -v"
          smoke_test: "All 7 health check tests pass (no regressions)"
          production_test: |
            Start all services → redis-cli XINFO GROUPS → verify consumer groups for each service
            Stop all → verify groups cleaned up
        estimated_files: 8
        estimated_lines: 300
        priority: "high"
        status: "pending"
        dependencies: ["T5.4"]
        context_files:
          - path: "agent-platform/services/shared/src/agentp_shared/event_bus.py"
            description: "EventBus implementation — currently unused, activate here"
          - path: "agent-platform/services/*/src/agentp_*/main.py"
            description: "Each service's main.py — add EventBus init in lifespan"
        verification:
          - "All 7 services create EventBus on startup"
          - "Consumer groups exist in Redis"
          - "Graceful shutdown closes connections"
        acceptance_criteria:
          - "EventBus initialized in every service lifespan"
          - "Topic subscriptions registered per service"
          - "Redis Streams consumer groups created"
        failure_modes:
          - scenario: "Redis connection failure prevents service startup"
            likelihood: low
            impact: high
            mitigation: "Log error but allow service to start in degraded mode (no events)"
        tech_stack:
          - "FastAPI"
          - "Redis Streams"
          - "pytest"
        test_coverage: "eventbus_init"

      - id: T8.2
        name: "Event publishers — lifecycle and usage events"
        tdd:
          test: |
            Write tests in tests/test_eventbus_publish.py:
            - Host service publishes agent.created on instance creation
            - Host service publishes agent.destroyed on instance destruction
            - Host service publishes agent.status_changed on status transition
            - Host service publishes agent.usage on send_message (with token counts)
            - Event payload matches schema: { topic, data, source_service, request_id, timestamp }
            - Events appear in Redis Streams: XRANGE event:agent.created - +
          implement: |
            Add event publishing calls to host service:
            - After create_instance: bus.publish("agent.created", { instance_id, org_id, user_id, name, model })
            - After destroy_instance: bus.publish("agent.destroyed", { instance_id, org_id })
            - After status change: bus.publish("agent.status_changed", { instance_id, old_status, new_status })
            - After send_message: bus.publish("agent.usage", { instance_id, model, input_tokens, output_tokens })
            Add AuditLog model field: publish on every gateway request.
          verify: "pytest tests/test_eventbus_publish.py -v"
          smoke_test: "All host tests pass (existing + new event tests)"
          production_test: |
            Create instance → redis-cli XRANGE event:agent.created - + → verify event payload
            Send message → redis-cli XRANGE event:agent.usage - + → verify token counts
        estimated_files: 3
        estimated_lines: 150
        priority: "high"
        status: "pending"
        dependencies: ["T8.1"]
        context_files:
          - path: "agent-platform/services/host/src/agentp_host/service.py"
            description: "Host service — add event publishing after state changes"
        verification:
          - "Events published to Redis Streams with correct payload"
          - "Schema matches EventBus.Event dataclass"
          - "request_id propagated from original request"
        acceptance_criteria:
          - "agent.created/destroyed/status_changed/usage events published by host"
          - "Event payload includes instance_id, org_id, user_id"
          - "Events queryable via Redis XRANGE"
        failure_modes: []
        tech_stack:
          - "FastAPI"
          - "Redis"
          - "pytest"
        test_coverage: "eventbus_publish"

      - id: T8.3
        name: "Event consumers — billing and scheduler reactions"
        tdd:
          test: |
            Write tests in tests/test_eventbus_consume.py:
            - Billing subscribes to agent.usage → creates UsageRecord
            - Billing subscribes to agent.created → initializes billing record for instance
            - Scheduler subscribes to agent.created → checks if approval needed
            - Scheduler subscribes to billing.alert → sends notification (log for now)
            - Events processed at-least-once (consumer group acknowledgment)
            - Event handler errors logged but do not crash consumer
          implement: |
            Add event handlers to billing service:
            - on_agent_usage(event): extract token counts, INSERT UsageRecord
            - on_agent_created(event): create initial billing record
            Add event handlers to scheduler:
            - on_agent_created(event): check org approval policy, create Approval if needed
            - on_billing_alert(event): log warning, future: send notification
            All handlers wrapped in try/except to prevent consumer crash.
          verify: "pytest tests/test_eventbus_consume.py -v"
          smoke_test: "All service tests pass"
          production_test: |
            Create instance + send message → verify UsageRecord auto-created in DB
            Set org approval policy → create instance → verify Approval auto-created
        estimated_files: 3
        estimated_lines: 200
        priority: "high"
        status: "pending"
        dependencies: ["T8.2"]
        context_files:
          - path: "agent-platform/services/billing/src/agentp_billing/"
            description: "Billing — add event handlers"
          - path: "agent-platform/services/scheduler/src/agentp_scheduler/"
            description: "Scheduler — add event handlers"
        verification:
          - "Billing auto-creates UsageRecord on agent.usage event"
          - "Scheduler auto-creates Approval on agent.created (when policy requires)"
          - "Error in handler does not crash consumer"
        acceptance_criteria:
          - "Billing reacts to agent.usage and agent.created events"
          - "Scheduler reacts to agent.created and billing.alert events"
          - "At-least-once delivery via Redis consumer groups"
          - "Error isolation per handler"
        failure_modes:
          - scenario: "Event consumer falls behind during high load"
            likelihood: low
            impact: medium
            mitigation: "Monitor consumer lag; scale consumers if needed; dead letter for failed events"
        tech_stack:
          - "FastAPI"
          - "Redis Streams"
          - "pytest"
        test_coverage: "eventbus_consume"
    acceptance_criteria:
      - "All 8 services initialize EventBus in lifespan"
      - "Host publishes 4 event types (created, destroyed, status_changed, usage)"
      - "Billing and scheduler consume events and react"
      - "Cross-service event flow verified end-to-end"
      - "Error isolation per handler"
    estimated_effort: "M"

