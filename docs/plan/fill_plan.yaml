pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Alembic migration conflicts with existing data in dev databases"
      likelihood: medium
      impact: medium
      mitigation: "Migration uses nullable columns + defaults; run alembic check after upgrade; include downgrade path"
    - scenario: "AgentConfig model complexity (11 nested JSON fields) causes validation issues"
      likelihood: medium
      impact: high
      mitigation: "Use Pydantic nested models for validation; write comprehensive schema tests before model"
    - scenario: "Celery + asyncpg event loop conflict in scheduler tasks"
      likelihood: high
      impact: medium
      mitigation: "Use NullPool in task DB connections; create fresh engine per task execution (from debugging notes)"
    - scenario: "Test API key fixture conflicts with real API key auth"
      likelihood: low
      impact: medium
      mitigation: "Use dedicated test database + seed data; fixture sets key in test isolation"
  assumptions:
    - "PostgreSQL and Redis containers (agentp-pg, agentp-redis) are running via Podman"
    - "Python 3.11+ venv is activated at .venv"
    - "Existing models (Organization, User, ApiKey, AgentInstance, UsageRecord, MemoryAsset, BillingRule, TaskRecord) are NOT recreated"
    - "SDK noop driver is used for all Host tests (real Podman driver is future work)"
    - "pytest-asyncio with asyncio_mode=auto is configured; session-scoped async fixtures avoided (from debugging notes)"

