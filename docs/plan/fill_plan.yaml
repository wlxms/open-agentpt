            - GET /api/v1/org/{id}/members — list with pagination, role filter
            - POST /api/v1/org/{id}/members — add member with role, duplicate check
            - DELETE /api/v1/org/{id}/members/{user_id} — remove member
            - PUT /api/v1/org/{id}/members/{user_id} — change role
