        tdd:
          test: |
            Write tests in tests/test_scheduler_registry.py:
            - ServiceRegistry class: register(name, url, health_url) stores in Redis hash
            - heartbeat(name) updates last_heartbeat timestamp
            - is_healthy(name) returns True if heartbeat within threshold (e.g., 30s)
            - get_service(name) returns service URL or raises SERVICE_UNAVAILABLE
            - deregister(name) removes from registry
            - list_services() returns all registered services with health status
            - Stale services (no heartbeat > threshold) auto-flagged as unhealthy
          implement: |
            Create services/shared/src/agentp_shared/registry.py:
            - ServiceRegistry class using Redis HSET/HGET for service entries
            - Each entry: { url, health_url, last_heartbeat, status }
            - Health check method that calls /health endpoint and updates status
            - Auto-deregistration on consecutive health check failures (configurable threshold)
            Replace scheduler's static ROUTE_TABLE with ServiceRegistry lookups.
            Each service adds registry.register() in lifespan startup and heartbeat in background task.
          verify: "pytest tests/test_scheduler_registry.py -v"
          smoke_test: "pytest tests/test_health_scheduler.py — scheduler health check passes"
          production_test: |
            Start all 7 services → verify registry populated via Redis CLI (HKEYS service_registry)
            Stop one service → wait >30s → verify auto-flagged unhealthy
            Restart → verify re-registered
        estimated_files: 3
        estimated_lines: 250
        priority: "high"
        status: "pending"
        dependencies: ["T0.2"]
        context_files:
          - path: "agent-platform/services/scheduler/src/agentp_scheduler/"
            description: "Current scheduler — replace proxy ROUTE_TABLE with registry"
          - path: "agent-platform/services/shared/src/agentp_shared/config.py"
            description: "Config — add REGISTRY_HEARTBEAT_INTERVAL, REGISTRY_STALE_THRESHOLD"
        verification:
          - "Services register on startup"
          - "Health check marks unhealthy services"
          - "Routing uses registry instead of static table"
          - "Auto-deregistration on consecutive failures"
        acceptance_criteria:
          - "ServiceRegistry in shared library, used by all services"
          - "Dynamic routing replaces hardcoded ROUTE_TABLE"
          - "Heartbeat interval and stale threshold configurable via env vars"
        failure_modes:
          - scenario: "Redis failure causes all services to appear unhealthy"
            likelihood: low
            impact: high
            mitigation: "Graceful degradation — route to last known good URL; log Redis connection errors"
          - scenario: "Registry race condition on service startup"
            likelihood: low
            impact: low
            mitigation: "Use Redis WATCH/MULTI or HSETNX for atomic register"
        tech_stack:
