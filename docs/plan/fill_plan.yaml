modules:
  # ============================================================================
  # P0: FOUNDATION HARDENING (detailed)
  # ============================================================================
  - id: M0-shared-hardening
    phase: P0
    name: "Shared Library Hardening"
    description: "Complete shared library foundation — new DB models, RBAC primitives, test fixtures, Alembic migration"
    agent: gem-implementer
    tasks:
      - id: T0.0
        name: "Dependency management — update pyproject.toml"
        tdd:
          test: |
            Write tests in tests/test_dependencies.py:
            - import celery succeeds
            - import multipart succeeds
            - import yaml succeeds
            - import httpx succeeds
            - All existing imports still work (no version conflicts)
          implement: |
            Update agent-platform/pyproject.toml:
            - Add celery[redis] (for P5)
            - Add python-multipart (for P4 binary uploads)
            - Add pyyaml (for P2 import/export)
            - Add httpx-ws (for P6 WebSocket, optional)
            Pin compatible versions. Run pip install -e . to verify.
          verify: "pytest tests/test_dependencies.py -v"
          smoke_test: "python -c 'import celery; import multipart; import yaml; print(ok)'"
          production_test: "pip install -e . — all dependencies install without conflicts"
        estimated_files: 1
        estimated_lines: 30
        priority: "critical"
        status: "pending"
        dependencies: []
        context_files:
          - path: "agent-platform/pyproject.toml"
            description: "Root project config — add new dependencies"
        verification:
          - "All new packages importable"
          - "No version conflicts with existing packages"
        acceptance_criteria:
          - "celery, python-multipart, pyyaml added to pyproject.toml"
          - "pip install -e . succeeds"
        failure_modes:
          - scenario: "Version conflict between new and existing packages"
            likelihood: low
            impact: medium
            mitigation: "Pin specific compatible versions; use pip's resolution output to identify conflicts"
        tech_stack:
          - "pip"
          - "pytest"
        test_coverage: "dependencies"

      - id: T0.1
        name: "Add missing DB models (AgentConfig, Approval, Budget)"
        tdd:
          test: |
            Write tests in tests/test_models.py:
            - AgentConfig: create with all 11 JSONB fields (personality, model, tools, skills, mcp_servers, workspace, permissions, appearance)
            - AgentConfig: defaults for visibility='private', version='1.0.0'
            - AgentConfigVersion: FK to agent_config, fields version/changelog/created_at
            - Approval: FK to user + org, status enum (pending/approved/rejected), template_name, config_summary, reason, reviewed_by, reviewed_at
            - Budget: FK to org, threshold (Numeric), alert_rules (JSONB), timestamps
            - AuditLog: timestamp, source_ip, api_key_id, user_id, org_id, method, path, query_params (JSONB), status_code, latency_ms, request_id
            - Template: FK to org + author, name, description, category, scenario, skills (JSONB), mcp (JSONB), resource_spec (JSONB), usage_count, visibility, published_at
            - Skill: name, description, author, version, package_url, category
            - McpServer: name, transport (enum: stdio|http|ws), description, config_template (JSONB), category
            - Category: name, icon (nullable), display_order
          implement: |
            Add AgentConfig, AgentConfigVersion, Approval, Budget, AuditLog, Template, Skill, McpServer, Category classes to
            services/shared/src/agentp_shared/models.py following existing model patterns
            (UUID primary keys, _utcnow defaults, proper indexes, JSONB columns).
            Do NOT modify existing models.
          verify: "pytest tests/test_models.py -v — all new model tests pass"
          smoke_test: "pytest tests/test_smoke_infrastructure.py — existing smoke tests still pass"
          production_test: |
            Verify against real PostgreSQL (Podman):
            1. alembic upgrade head (new migration applies)
            2. alembic check (no drift)
            3. Manual: insert + select + delete for each new model via psql
        estimated_files: 3
        estimated_lines: 250
        priority: "high"
        status: "pending"
        dependencies: []
        context_files:
          - path: "agent-platform/services/shared/src/agentp_shared/models.py"
            description: "Existing models — follow same patterns for new models"
          - path: "agent-platform/tests/test_models.py"
            description: "Existing model tests — extend with new model tests"
        verification:
          - "All 3 new models create/read/delete successfully"
          - "JSONB fields store and retrieve nested dicts correctly"
          - "Foreign keys reference correct parent tables"
        acceptance_criteria:
          - "AgentConfig model has all fields from api-protocol §4.3.1"
          - "Approval model has status enum and audit trail fields"
          - "Budget model has threshold and alert_rules JSONB"
          - "All models have proper indexes"
        failure_modes:
          - scenario: "JSONB column serialization issues with nested dicts"
            likelihood: medium
            impact: low
            mitigation: "Test with deeply nested structures; use sa.JSON directly"
        tech_stack:
          - "SQLAlchemy 2.0"
          - "pytest"
        test_coverage: "models"

      - id: T0.2
        name: "Generate Alembic migration for new models"
        tdd:
          test: |
            Write tests in tests/test_migration.py:
            - Migration file exists at alembic/versions/002_add_new_models.py
            - Migration creates agent_configs, agent_config_versions, approvals, budgets tables
            - Migration adds new indexes and constraints
            - Downgrade drops new tables cleanly
          implement: |
            Run alembic revision --autogenerate -m "add agent_config approval budget models"
            Review generated migration for correctness.
            Verify upgrade and downgrade paths.
          verify: "pytest tests/test_migration.py -v"
          smoke_test: "alembic upgrade head && alembic downgrade base && alembic upgrade head — roundtrip succeeds"
          production_test: "alembic check on production schema — no drift"
        estimated_files: 2
        estimated_lines: 150
        priority: "high"
        status: "pending"
        dependencies: ["T0.1"]
        context_files:
          - path: "agent-platform/alembic/versions/"
            description: "Existing migrations — follow naming convention"
          - path: "agent-platform/alembic/env.py"
            description: "Migration environment config"
        verification:
          - "Migration upgrades cleanly"
          - "Migration downgrades cleanly"
          - "No schema drift after upgrade"
        acceptance_criteria:
          - "Migration file follows naming convention 002_*.py"
          - "All 4 new tables created with correct columns"
          - "Downgrade path removes all new tables"
        failure_modes:
          - scenario: "Autogenerate misses indexes or constraints"
            likelihood: low
            impact: low
            mitigation: "Manually review migration file; compare against model definitions"
        tech_stack:
          - "Alembic"
          - "SQLAlchemy"
        test_coverage: "migration"

      - id: T0.3
        name: "Add test API key fixture and shared Pydantic schemas"
        tdd:
          test: |
            Write tests in tests/test_fixtures.py:
            - test_api_key fixture returns "sk-3aa4613249a34bc6a54d14f561ca7597"
            - authenticated_client fixture creates httpx.AsyncClient with valid JWT
            - db_session fixture provides clean async session per test (row-level cleanup, NOT drop_all)
          implement: |
            1. Add test_api_key fixture to tests/conftest.py (session-scoped, returns string constant)
            2. Add test_admin_api_key fixture (session-scoped)
            3. Add authenticated_client fixture (FUNCTION-scoped) that:
               - Generates JWT directly using shared.security.create_access_token()
               - Does NOT call auth service HTTP endpoint (avoids chicken-and-egg)
               - Returns httpx.AsyncClient with Authorization header
            4. Add db_session fixture (FUNCTION-scoped, row-level cleanup via DELETE)
            5. Add Pydantic schemas for new models to shared/schemas.py:
               - AgentConfigCreate, AgentConfigUpdate, AgentConfigResponse
               - ApprovalCreate, ApprovalResponse
               - BudgetCreate, BudgetUpdate, BudgetResponse
          verify: "pytest tests/test_fixtures.py -v"
          smoke_test: "Existing tests that use conftest fixtures still pass"
          production_test: "N/A (test-only change)"
        estimated_files: 2
        estimated_lines: 200
        priority: "high"
        status: "pending"
        dependencies: ["T0.1"]
        context_files:
          - path: "agent-platform/tests/conftest.py"
            description: "Existing test fixtures — extend with new ones"
          - path: "agent-platform/services/shared/src/agentp_shared/schemas.py"
            description: "Existing Pydantic schemas — extend"
        verification:
          - "test_api_key fixture returns correct value"
          - "authenticated_client can make authenticated API calls"
          - "No test isolation issues (row cleanup works)"
        acceptance_criteria:
          - "test_api_key returns 'sk-3aa4613249a34bc6a54d14f561ca7597'"
          - "authenticated_client fixture available to all tests"
          - "Pydantic schemas validate all fields from api-protocol §4.3.1"
        failure_modes:
          - scenario: "Session-scoped event loop conflicts with function-scoped fixtures"
            likelihood: medium
            impact: high
            mitigation: "conftest.py uses loop_scope='session' (all tests share one loop). Function-scoped fixtures MUST NOT create new event loops — use the existing loop's run_until_complete or async with. DB sessions use NullPool per debugging notes."
        tech_stack:
          - "pytest"
          - "Pydantic v2"
          - "httpx"
        test_coverage: "fixtures, schemas"

      - id: T0.4
        name: "Add RBAC middleware primitives to shared"
        tdd:
          test: |
            Write tests in tests/test_rbac.py:
            - require_role('admin') allows admin users, rejects non-admin
            - require_permission('agents:create') allows users with permission, rejects without
            - Permission check works with flat permission list from ApiKey.permissions JSONB
            - Default permissions defined: agents:create, agents:read, agents:destroy, agents:manage, members:manage, billing:manage, configs:manage, approvals:manage, org:manage
            - Default roles defined: admin (all permissions), manager (agents:*, members:read, billing:read), member (agents:create, agents:read, configs:manage)
          implement: |
            Add to services/shared/src/agentp_shared/security.py:
            - require_role(role: str) FastAPI dependency
            - require_permission(permission: str) FastAPI dependency
            - has_permission(user_permissions: list[str], required: str) -> bool
            - Permission hierarchy: admin > manager > member (admin inherits all)
          verify: "pytest tests/test_rbac.py -v"
          smoke_test: "Existing auth tests still pass (no regressions)"
          production_test: "N/A (shared library change, tested via service integration)"
        estimated_files: 2
        estimated_lines: 150
        priority: "medium"
        status: "pending"
        dependencies: ["T0.3"]
        context_files:
          - path: "agent-platform/services/shared/src/agentp_shared/security.py"
            description: "Existing security utils — extend with RBAC"
        verification:
          - "Role check correctly allows/rejects based on user.role"
          - "Permission check works with nested permission strings"
          - "Admin role bypasses all permission checks"
        acceptance_criteria:
          - "require_role and require_permission are importable from agentp_shared.security"
          - "Admin inherits all permissions"
          - "Unit tests cover role hierarchy and permission matching"
        failure_modes: []
        tech_stack:
          - "FastAPI"
          - "pytest"
        test_coverage: "rbac"
    acceptance_criteria:
      - "All 9 new models (AgentConfig, AgentConfigVersion, Approval, Budget, AuditLog, Template, Skill, McpServer, Category) have unit tests"
      - "Alembic migration 002 generated and applies/downgrades cleanly"
      - "Test API key fixture available in conftest.py"
      - "RBAC middleware primitives implemented with tests"
      - "Default permission set and roles defined"
    estimated_effort: "M"

