            Write tests in tests/test_e2e_lifecycle.py:
            - Complete flow: login → create instance → send message → verify usage → restart → destroy → verify billing record
            - Each step asserts correct response format per api-protocol
            - Verify UsageRecord created in billing DB after send_message
            - Verify audit log entries created for each request
            - Verify events in Redis Streams: agent.created, agent.usage, agent.destroyed
