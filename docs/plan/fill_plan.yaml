implementation_specification:
  code_structure: |
    Each service follows the existing pattern:
    services/{name}/src/agentp_{name}/
      ├── __init__.py
      ├── __main__.py
      ├── main.py        # FastAPI app + lifespan
      ├── config.py      # Service-specific settings
      ├── service.py     # Business logic
      ├── schemas.py     # Pydantic request/response models
      └── api/           # Route handlers
          ├── __init__.py
          └── routes.py
    Tests go in agent-platform/tests/test_{name}.py
    Shared utilities in services/shared/src/agentp_shared/
  affected_areas:
    - "services/shared/src/agentp_shared/models.py — new models"
    - "services/shared/src/agentp_shared/schemas.py — new Pydantic schemas"
    - "services/shared/src/agentp_shared/security.py — RBAC primitives"
    - "alembic/versions/ — new migration file"
    - "tests/conftest.py — shared fixtures"
    - "services/auth/src/agentp_auth/ — member management, key renewal, roles"
    - "services/market/src/agentp_market/ — persistence, builder endpoints"
    - "services/billing/src/agentp_billing/ — budget, CSV, rules, aggregation"
  component_details:
    - component: "AgentConfig model"
      responsibility: "Store Agent configuration with 11 configurable dimensions per api-protocol §4.3.1"
      interfaces:
        - "AgentConfig SQLAlchemy model with JSONB columns for personality, model, tools, skills, mcp_servers, workspace, permissions, appearance"
        - "AgentConfigVersion model for version history"
    - component: "Approval model"
      responsibility: "Track approval workflow requests"
      interfaces:
        - "Approval SQLAlchemy model with status enum (pending/approved/rejected)"
        - "CRUD operations via approval service"
    - component: "Budget model"
      responsibility: "Organization billing budget with alert rules"
      interfaces:
        - "Budget SQLAlchemy model with JSONB alert_rules"
        - "Threshold check function"
    - component: "RBAC middleware"
      responsibility: "Enforce role-based access on API endpoints"
      interfaces:
        - "require_role(role) decorator for FastAPI routes"
        - "require_permission(permission) decorator"
        - "Permission check against user's permissions list"
  dependencies:
    - component: "shared.models"
      relationship: "All services import models from agentp_shared.models"
    - component: "alembic"
      relationship: "Migration must be generated after model changes and applied before service tests"
  integration_points:
    - "tests/conftest.py — shared fixtures available to all test files"
    - "alembic/env.py — migration environment reads from shared models"
    - "services/shared/src/agentp_shared/__init__.py — public API exports"

