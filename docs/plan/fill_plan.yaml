          smoke_test: "pytest tests/test_health_auth.py — auth health check passes; curl http://localhost:8001/api/v1/org/org-root/members → expect 200"
          production_test: "curl chain: create org → add member → list members → change role → remove member"
        estimated_files: 2
        estimated_lines: 200
        priority: "high"
        status: "pending"
        dependencies: ["T1.0"]
        context_files:
          - path: "agent-platform/services/auth/src/agentp_auth/service.py"
            description: "Existing auth service — add member management functions"
          - path: "agent-platform/services/auth/src/agentp_auth/api/"
            description: "Existing auth routes — add member endpoints"
        verification:
