          verify: "pytest tests/test_memory_search.py -v"
          smoke_test: "Full memory test suite passes"
          production_test: |
            Create assets with names containing "python", "review", "config"
            GET /memory/search?keyword=python → returns only matching assets
            GET /memory/search?keyword=NONEXISTENT → returns empty list
        estimated_files: 2
        estimated_lines: 100
        priority: "high"
        status: "pending"
        dependencies: ["T4.2"]
        context_files:
          - path: "agent-platform/services/memory/src/agentp_memory/service.py"
            description: "Existing memory service — add search"
        verification:
          - "Keyword matches against name and path"
          - "Case-insensitive search"
          - "Pagination correct"
          - "SQL injection safe"
        acceptance_criteria:
          - "GET /memory/search matches §4.8"
          - "Case-insensitive ILIKE matching"
