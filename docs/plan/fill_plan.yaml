  # ============================================================================
  # P4: MEMORY SERVICE ENHANCEMENT (outlined)
  # ============================================================================
  - id: M4-memory-enhancement
    phase: P4
    name: "Memory Service Enhancement"
    description: "Extend memory service — binary file support, keyword search, tree browse, large file/chunked upload"
    agent: gem-implementer
    tasks:
      - id: T4.1
        name: "Binary file upload/download (§4.8 PUT/GET assets)"
        tdd:
          test: |
            Write tests in tests/test_memory_binary.py:
            - PUT /api/v1/memory/assets/{path} with multipart/form-data — stores binary file
            - GET /api/v1/memory/assets/{path} — returns file stream with correct Content-Type
            - Content-Type detection: .png → image/png, .json → application/json, .zip → application/zip
            - File size stored in metadata (MemoryAsset.size updated)
            - Upload with duplicate path overwrites (or returns 409 CONFLICT)
            - Download non-existent path returns 404
            - Upload zero-byte file accepted
          implement: |
            1. Extend MemoryAsset model: add `size` (BigInteger), `content_type` (String), `storage_path` (String — filesystem location)
            2. Modify memory service.py:
               - PUT endpoint uses FastAPI UploadFile, saves to filesystem under configurable storage root
               - Records metadata (path, size, content_type, storage_path) in PostgreSQL
               - GET endpoint reads from filesystem, returns StreamingResponse with Content-Type header
            3. Add storage root config (default: ./data/memory/)
            4. Mimetype detection via python-magic or mimetypes stdlib
          verify: "pytest tests/test_memory_binary.py -v"
          smoke_test: "pytest tests/test_health_memory.py — health check passes"
          production_test: |
            curl -X PUT -F 'file=@test.png' http://localhost:8004/api/v1/memory/assets/org-root/test/test.png
            curl -o downloaded.png http://localhost:8004/api/v1/memory/assets/org-root/test/test.png
            Verify files match via checksum
        estimated_files: 3
        estimated_lines: 200
        priority: "high"
        status: "pending"
        dependencies: ["T0.2"]
        context_files:
          - path: "agent-platform/services/memory/src/agentp_memory/service.py"
            description: "Existing memory service — extend for binary support"
          - path: "agent-platform/services/memory/src/agentp_memory/config.py"
            description: "Memory config — add storage_root setting"
          - path: "agent-platform/services/shared/src/agentp_shared/models.py"
            description: "MemoryAsset model — add size, content_type, storage_path columns"
        verification:
          - "Binary files upload and download correctly"
          - "Content-Type auto-detected and returned"
          - "File size metadata accurate"
          - "Overwrite behavior correct"
        acceptance_criteria:
          - "PUT /memory/assets/{path} with multipart/form-data per §4.8"
          - "GET /memory/assets/{path} returns StreamingResponse with correct Content-Type"
          - "Filesystem storage path configurable via MEMORY_STORAGE_ROOT env var"
        failure_modes:
          - scenario: "Large file upload causes OOM or timeout"
            likelihood: medium
            impact: medium
            mitigation: "Stream to disk via UploadFile.file (not read into memory); configurable max_upload_size"
          - scenario: "Storage directory permissions issue on Windows"
            likelihood: medium
            impact: low
            mitigation: "Create storage_root on first upload if not exists; log warning on permission error"
        tech_stack:
          - "FastAPI"
          - "python-multipart"
          - "pytest"
          - "httpx"
        test_coverage: "memory_binary"

      - id: T4.2
        name: "Tree browse endpoint (§4.8 GET assets with recursive listing)"
        tdd:
          test: |
            Write tests in tests/test_memory_tree.py:
            - GET /api/v1/memory/assets?path=org-root/skills&recursive=true
            - Returns hierarchical tree: { "items": [{ "path": "...", "name": "...", "type": "file|dir", "size": ..., "updated_at": "..." }] }
            - Without recursive=true: only direct children of path
            - Empty path: lists root-level entries
            - Non-existent path: returns empty list (not 404)
            - Pagination: page + page_size works on top-level entries
            - Directory entries have type="dir" and size=0
            - Entries sorted by type (dirs first) then name alphabetically
          implement: |
            Add tree browse to memory service.py:
            - Query MemoryAsset table with path prefix matching
            - If recursive=false: filter by immediate parent path
            - If recursive=true: all descendants of path prefix
            - Group by directory segments to infer directory entries
            - Return flat list with type field (infer directories from path separators)
          verify: "pytest tests/test_memory_tree.py -v"
          smoke_test: "Full memory test suite passes (test_memory.py + test_memory_binary.py + test_memory_tree.py)"
          production_test: |
            Create nested assets: org-root/a/b/1.txt, org-root/a/b/2.txt, org-root/a/c/3.txt
            GET /memory/assets?path=org-root/a&recursive=true → returns 4 items (a/b dir, a/c dir, 3 files)
            GET /memory/assets?path=org-root/a&recursive=false → returns 2 items (b dir, c dir)
        estimated_files: 2
        estimated_lines: 150
        priority: "high"
        status: "pending"
        dependencies: ["T4.1"]
        context_files:
          - path: "agent-platform/services/memory/src/agentp_memory/service.py"
            description: "Existing memory service — add tree browse"
        verification:
          - "Tree returns correct hierarchical structure"
          - "Recursive flag controls depth"
          - "Directory entries inferred correctly"
          - "Pagination works on flat list"
        acceptance_criteria:
          - "GET /memory/assets matches §4.8 response format"
          - "recursive query parameter controls traversal depth"
          - "Entries sorted: directories first, then alphabetical"
        failure_modes:
          - scenario: "Deep directory tree causes slow query"
            likelihood: low
            impact: medium
            mitigation: "LIKE query on path column with index; limit recursive depth"
        tech_stack:
          - "FastAPI"
          - "SQLAlchemy async"
          - "pytest"
        test_coverage: "memory_tree"

      - id: T4.3
        name: "Keyword search endpoint (§4.8 GET /memory/search)"
        tdd:
          test: |
            Write tests in tests/test_memory_search.py:
            - GET /api/v1/memory/search?keyword=python&page=1&page_size=20
            - Matches against asset name (ILIKE) and path (ILIKE)
            - Returns paginated results: { "items": [...], "total": N, "page": 1, "page_size": 20 }
            - Empty keyword returns 422 VALIDATION_ERROR
            - No matches returns empty list with total=0
