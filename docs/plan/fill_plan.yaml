  # ============================================================================
  # P6: GATEWAY PRODUCTION HARDENING (outlined)
  # ============================================================================
  - id: M6-gateway-hardening
    phase: P6
    name: "Gateway Production Hardening"
    description: "Add production features to gateway — rate limiting, CORS, audit logs, circuit breaker, WebSocket streaming"
    agent: gem-implementer
    tasks:
      - id: T6.1
        name: "Redis-based rate limiting (§7.4)"
        tdd:
          test: |
            Write tests in tests/test_gateway_ratelimit.py:
            - Global rate limit: requests exceed GATEWAY_RATE_LIMIT → 429 with retry_after
            - Per-org rate limit: each org has GATEWAY_ORG_RATE_LIMIT → 429 when exceeded
            - Per-user rate limit: each user has GATEWAY_USER_RATE_LIMIT → 429 when exceeded
            - Per-endpoint rate limit: /api/v1/agents POST has lower limit → 429
            - Rate limit headers in response: X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset
            - Sliding window algorithm using Redis INCR + EXPIRE
            - Health check /health bypasses rate limiting
          implement: |
            Create services/shared/src/agentp_shared/rate_limiter.py:
            - RedisSlidingWindowLimiter class using Redis INCR + EXPIRE
            - check_limit(key: str, limit: int, window_seconds: int) -> (allowed: bool, remaining: int, reset_at: int)
            Add rate limiting middleware to gateway:
            - 4 levels: global, per-org (X-Tenant-ID), per-user (X-User-ID), per-endpoint
            - Configurable via env vars: GATEWAY_RATE_LIMIT, GATEWAY_ORG_RATE_LIMIT, GATEWAY_USER_RATE_LIMIT
            - Returns 429 RATE_LIMITED with { retry_after: N } per api-protocol §2.3
            - Adds X-RateLimit-* headers to all responses
          verify: "pytest tests/test_gateway_ratelimit.py -v"
          smoke_test: "pytest tests/test_health_gateway.py — gateway health still passes"
          production_test: |
            Send N+1 requests rapidly → verify 429 on N+1th request
            Wait for window reset → verify request succeeds
            Verify X-RateLimit-* headers in response
        estimated_files: 3
        estimated_lines: 200
        priority: "high"
        status: "pending"
        dependencies: ["T5.1"]
        context_files:
          - path: "agent-platform/services/gateway/src/agentp_gateway/"
            description: "Gateway — add rate limiting middleware"
          - path: "agent-platform/services/shared/src/agentp_shared/"
            description: "Shared — add rate limiter utility"
        verification:
          - "4 returned after N+1 requests within window"
          - "X-RateLimit-* headers present"
          - "Health check bypasses rate limit"
          - "Per-org and per-user limits work independently"
        acceptance_criteria:
          - "4-level rate limiting: global, org, user, endpoint"
          - "Redis sliding window algorithm"
          - "429 response matches api-protocol §2.3 RATE_LIMITED error format"
          - "Configurable limits via env vars"
        failure_modes:
          - scenario: "Redis connection timeout causes all requests to fail"
            likelihood: low
            impact: high
            mitigation: "If Redis unavailable, allow all requests (fail-open) with warning log"
        tech_stack:
          - "FastAPI"
          - "Redis"
          - "pytest"
          - "httpx"
        test_coverage: "gateway_ratelimit"

      - id: T6.2
        name: "CORS configuration"
        tdd:
          test: |
            Write tests in tests/test_gateway_cors.py:
            - OPTIONS preflight request returns CORS headers
            - Access-Control-Allow-Origin matches GATEWAY_CORS_ORIGINS
            - Access-Control-Allow-Methods, Allow-Headers set correctly
            - Non-listed origin gets no CORS headers
            - Credentials allowed when configured
          implement: |
            Add CORSMiddleware to gateway with configurable origins:
            - GATEWAY_CORS_ORIGINS env var (comma-separated, default: "*")
            - Allow methods: GET, POST, PUT, DELETE, PATCH, OPTIONS
            - Allow headers: Authorization, Content-Type, X-OH-API-Key
            - Development mode: allow all origins
            - Production mode: restrict to configured origins
          verify: "pytest tests/test_gateway_cors.py -v"
          smoke_test: "Existing gateway tests pass"
          production_test: |
            curl -X OPTIONS -H 'Origin: http://localhost:5173' http://localhost:8000/api/v1/agents
            Verify Access-Control-Allow-Origin header
        estimated_files: 2
        estimated_lines: 80
        priority: "high"
        status: "pending"
        dependencies: ["T6.1"]
        context_files:
          - path: "agent-platform/services/gateway/src/agentp_gateway/"
            description: "Gateway — add CORS middleware"
        verification:
          - "CORS headers correct for configured origins"
          - "Non-listed origins rejected"
        acceptance_criteria:
          - "CORS configurable via GATEWAY_CORS_ORIGINS"
          - "Dev mode allows all, prod mode restricts"
        failure_modes: []
        tech_stack:
          - "FastAPI CORSMiddleware"
          - "pytest"
        test_coverage: "gateway_cors"

      - id: T6.3
        name: "Audit logging (§7.5)"
        tdd:
          test: |
            Write tests in tests/test_gateway_audit.py:
            - Every request creates audit log entry in database
            - Entry contains: timestamp, source_ip, api_key_id, user_id, org_id, method, path, query_params, status_code, latency_ms, request_id
            - Sensitive fields in query_params auto-masked (api_key → ****, password → ****)
            - Health check /health NOT logged (configurable skip paths)
            - Audit log queryable (not via gateway, but direct DB)
          implement: |
            Create AuditLog model in shared/models.py:
            - id, timestamp, source_ip, api_key_id, user_id, org_id, method, path, query_params (JSONB), status_code, latency_ms, request_id
            Add audit middleware to gateway:
            - After response, insert AuditLog record via async DB session
            - Mask sensitive fields in query_params before storage
            - Skip paths from GATEWAY_AUDIT_SKIP_PATHS env var (default: /health)
            - Non-blocking: fire-and-forget insert (don't block response)
          verify: "pytest tests/test_gateway_audit.py -v"
          smoke_test: "Full gateway test suite passes"
          production_test: |
            Make requests → query audit_logs table → verify entries created
            Verify sensitive fields masked
        estimated_files: 3
        estimated_lines: 200
        priority: "high"
        status: "pending"
        dependencies: ["T6.2"]
        context_files:
          - path: "agent-platform/services/gateway/src/agentp_gateway/"
            description: "Gateway — add audit middleware"
          - path: "agent-platform/services/shared/src/agentp_shared/models.py"
            description: "Shared models — add AuditLog"
        verification:
          - "Audit entries created for every request"
          - "Sensitive fields masked"
          - "Health check skipped"
          - "Non-blocking (doesn't increase response latency)"
        acceptance_criteria:
          - "Audit log per §7.5: timestamp, IP, API key, path, status, latency"
          - "Sensitive field masking"
          - "Configurable skip paths"
        failure_modes:
          - scenario: "High QPS causes audit log DB bottleneck"
            likelihood: medium
            impact: medium
            mitigation: "Non-blocking insert; batch writes if needed; consider separate audit DB in future"
        tech_stack:
          - "FastAPI"
          - "SQLAlchemy async"
          - "pytest"
        test_coverage: "gateway_audit"

      - id: T6.4
        name: "Circuit breaker (§7.4)"
        tdd:
          test: |
            Write tests in tests/test_gateway_circuit.py:
            - Circuit breaker starts in CLOSED state (normal operation)
            - After N consecutive failures → transitions to OPEN (returns 503 SERVICE_UNAVAILABLE)
            - After timeout → transitions to HALF_OPEN (allows 1 probe request)
            - Probe succeeds → CLOSED; probe fails → OPEN
            - Circuit breaker state tracked per downstream service
            - Open state response: { code: "SERVICE_UNAVAILABLE", details: { retry_after: N, service: "host" } }
          implement: |
            Create services/shared/src/agentp_shared/circuit_breaker.py:
            - CircuitBreaker class with states: CLOSED, OPEN, HALF_OPEN
            - track_success(service_name) / track_failure(service_name)
            - is_open(service_name) -> bool
            - Configurable: failure_threshold (default 5), recovery_timeout (default 30s), half_open_max_probes (default 1)
            Integrate with gateway proxy: wrap downstream calls in circuit breaker
            Track failures from httpx ConnectError, TimeoutException, 5xx responses
          verify: "pytest tests/test_gateway_circuit.py -v"
          smoke_test: "Full gateway test suite passes"
          production_test: |
            Stop downstream service → send requests → verify circuit opens (503)
            Wait recovery_timeout → verify half-open allows probe
            Restart downstream → verify circuit closes
        estimated_files: 2
        estimated_lines: 150
        priority: "high"
        status: "pending"
        dependencies: ["T6.3"]
        context_files:
          - path: "agent-platform/services/gateway/src/agentp_gateway/"
            description: "Gateway — integrate circuit breaker"
        verification:
          - "State transitions: CLOSED → OPEN → HALF_OPEN → CLOSED"
          - "Per-service circuit breaker isolation"
          - "503 response matches api-protocol §2.3"
        acceptance_criteria:
          - "Circuit breaker per downstream service"
          - "Configurable thresholds via env vars"
          - "503 SERVICE_UNAVAILABLE with retry_after per §2.3"
        failure_modes:
          - scenario: "Circuit breaker opens prematurely due to transient errors"
            likelihood: medium
            impact: medium
            mitigation: "Only count 5xx and connection errors; ignore 4xx client errors"
        tech_stack:
          - "FastAPI"
          - "httpx"
          - "pytest"
        test_coverage: "gateway_circuit"

      - id: T6.5
        name: "WebSocket streaming endpoint (§1.6, §4.2)"
        tdd:
          test: |
            Write tests in tests/test_gateway_websocket.py:
