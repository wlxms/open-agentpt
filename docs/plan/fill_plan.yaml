        estimated_files: 2
        estimated_lines: 150
        priority: "medium"
        status: "pending"
        dependencies: ["T6.4"]
        context_files:
          - path: "agent-platform/services/gateway/src/agentp_gateway/"
            description: "Gateway — add WebSocket proxy"
        verification:
          - "JWT auth via query parameter"
          - "WebSocket proxy to host service"
          - "Bidirectional message forwarding"
        acceptance_criteria:
          - "WS /api/v1/agents/{id}/stream per §1.6"
          - "Authentication via ?token= query parameter"
          - "Bidirectional proxy to host service"
