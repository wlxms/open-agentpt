plan_id: ohe-skeleton
objective: |
  构建 OpenHarness Enterprise 企业后台系统骨架，跑通 Gateway → Scheduler → Auth/Host 全链路。
  骨架阶段使用 noop driver，验证服务间 HTTP 通信、JWT 认证、实例创建/查询/销毁最小 API。
  TDD 模式开发，每步先写测试再写实现。
created_at: "2026-04-16T00:00:00Z"
created_by: gem-planner
status: completed
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 24
  risk_score: medium

tldr: |
  Phase 0: 准备开发环境（Podman PG/Redis 容器、Python venv、依赖安装、SDK 安装 + noop+seed 验证）
  Phase 1: 搭建 shared 公共库（含 db.py/redis.py/全 11 错误码） + API-to-SDK 映射层 + 7 个微服务骨架
  Phase 2: 实现 Gateway JWT 中间件 + Auth 服务(API Key 登录+logout) + Host 服务(API-to-SDK 映射) + Scheduler 星型路由
  Phase 3: 跑通全链路 E2E 验证（login → JWT → agents → create → get → delete，含过期 token 场景）
  Phase 4: 模块化填充 memory/market/billing 骨架 API + 集成测试覆盖

open_questions:
  - "supervisor 是否已安装，还是使用 PowerShell 启动脚本代替？建议骨架阶段用 PowerShell 脚本启动各服务，减少依赖"
  - "[已决策] 骨架阶段 auth 用内存 dict 存储 API Key，不引入 DB 持久化；Phase 4 memory 服务时再引入 Alembic（第一个真正需要持久化的服务）"
  - "[已决策] SDK InstanceCreateRequest.template_dir 必填问题：Host 服务预创建 /tmp/ohent-templates/default/ 空目录，allowed_roots 设为 ['/tmp/ohent']"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Podman 容器启动失败或 PostgreSQL/Redis 连接不通"
      likelihood: medium
      impact: high
      mitigation: "Phase 0 验证步骤包含独立容器连接测试；提供备用 SQLite + fakeredis 方案降级"
    - scenario: "服务间 HTTP 通信端口冲突或路由配置错误"
      likelihood: medium
      impact: medium
      mitigation: "shared/config.py 统一端口分配；每个服务启动时打印端口信息；health endpoint 优先验证"
    - scenario: "JWT token 跨服务验证不一致（网关签发 vs auth 服务签发）"
      likelihood: medium
      impact: high
      mitigation: "JWT 工具函数统一放在 ohent_shared/security.py；所有服务引用同一模块；auth 服务负责签发，网关负责验证"
    - scenario: "SDK OrchestratorClient noop driver 接口变更导致 Host 服务集成失败"
      likelihood: low
      impact: high
      mitigation: "Phase 0 验证 SDK noop driver 可正常创建实例；Host 服务对 SDK 调用做 try/except 包装"
    - scenario: "noop driver apply_seed() 执行真实文件 I/O，template_dir 不在 allowed_roots 时抛 SEED_PATH_UNSAFE"
      likelihood: medium
      impact: high
      mitigation: "Host 服务启动时预创建 /tmp/ohent-templates/default/ 空目录；allowed_roots 配置为 ['/tmp/ohent']；ohent-env-sdk-verify 任务中增加 noop+seed 验证用例"
    - scenario: "SQLAlchemy async session 在测试中未正确清理导致表锁或连接泄漏"
      likelihood: medium
      impact: medium
      mitigation: "测试使用独立的 test database + 每个测试用例 async session 工厂 + fixture 级别 cleanup"
  assumptions:
    - "本地已安装 Podman（用户确认）"
    - "Python 3.11+ 已可用（用户确认）"
    - "骨架阶段使用 noop driver，无需真实容器环境"
    - "服务间通信全部使用 HTTP（无 gRPC）"
    - "Celery 在骨架阶段用同步函数模拟，不启动 worker"
    - "前端不在本次规划范围内"
    - "骨架阶段 auth 用内存 dict 存储 API Key，不引入 DB 持久化"
    - "Phase 4 memory 服务时再引入 Alembic 迁移（第一个真正需要持久化的服务）"
    - "noop driver 的 template_dir 使用预创建的空目录 /tmp/ohent-templates/default/"

implementation_specification:
  code_structure: |
    services/
    ├── shared/              # ohent_shared 公共库
    │   └── src/ohent_shared/
    │       ├── config.py        # Pydantic Settings 基类 + 端口常量 + DEFAULT_API_KEYS
    │       ├── security.py      # JWT 签发/验证/刷新 (payload 含 permissions 字段)
    │       ├── errors.py        # 统一 11 个错误码枚举 + OHError 异常类 + 错误响应模型
    │       ├── responses.py     # 统一响应包装器 (data/items/ok/error)
    │       ├── db.py            # async engine + session 工厂 (完整实现，骨架阶段备用)
    │       ├── redis.py         # Redis 连接工厂 (完整实现，骨架阶段备用)
    │       ├── schemas.py       # 公共 Pydantic 模型 (RequestContext, PaginatedResponse)
    │       └── service_client.py # 服务间 HTTP 调用封装 (含 X-Org-ID 头透传)
    ├── gateway/
    │   └── src/gateway/
    │       ├── main.py          # FastAPI app + lifespan + 中间件
    │       ├── config.py        # Gateway 配置 (路由表、端口)
    │       ├── middleware.py     # JWT 认证中间件 + request_id 注入
    │       └── proxy.py         # 请求转发到后端服务
    ├── auth/
    │   └── src/auth/
    │       ├── main.py
    │       ├── config.py
    │       ├── models.py        # ApiKey ORM 模型 (骨架用内存 dict)
    │       ├── schemas.py       # LoginRequest, TokenResponse
    │       ├── api/v1/auth.py   # login/refresh/me 路由
    │       └── service.py       # API Key 验证 + JWT 签发逻辑
    ├── host/
    │   └── src/host/
    │       ├── main.py
    │       ├── config.py
    │       ├── api/v1/agents.py # agents CRUD 路由
    │       └── service.py       # OrchestratorClient 封装
    ├── scheduler/
    │   └── src/scheduler/
    │       ├── main.py
    │       ├── config.py
    │       ├── api/v1/agents.py # 转发到 host 的代理路由
    │       └── proxy.py         # 服务路由转发逻辑
    ├── memory/
    │   └── src/memory/
    │       ├── main.py
    │       ├── config.py
    │       └── api/v1/assets.py # 骨架: GET /health only
    ├── market/
    │   └── src/market/
    │       ├── main.py
    │       ├── config.py
    │       └── api/v1/templates.py # 骨架: GET /health only
    └── billing/
        └── src/billing/
            ├── main.py
            ├── config.py
            └── api/v1/usage.py # 骨架: GET /health only

    scripts/
    └── dev_start.ps1           # PowerShell 一键启动所有服务
    tests/
    └── e2e_full_chain.py       # 全链路 E2E 测试

  affected_areas:
    - "OpenHarnessEnterprise/services/ (新建全部服务骨架)"
    - "OpenHarnessEnterprise/scripts/ (新建启动脚本)"
    - "OpenHarnessEnterprise/tests/ (新建测试)"

  component_details:
    - component: "ohent_shared"
      responsibility: "提供所有服务共享的工具函数、配置基类、安全工具、响应格式、DB/Redis 连接工厂"
      interfaces:
        - "create_access_token(data, expires_delta) -> str"
        - "decode_token(token) -> dict"
        - "create_refresh_token(data, expires_delta) -> str"
        - "OHError(code, message, status_code) -> HTTPException"
        - "ok_response() -> dict"
        - "data_response(data) -> dict"
        - "error_response(code, message, request_id, details) -> dict"
        - "get_db() -> AsyncGenerator[AsyncSession]"
        - "get_redis() -> Redis"
        - "ServiceClient.call(service, method, path, ctx) -> dict"
    - component: "gateway"
      responsibility: "API 网关，接收外部请求，JWT 验证。auth 路由直连 auth 服务，其余全部转发到 scheduler（星型拓扑）"
      interfaces:
        - "GET /health -> { status: 'ok' }"
        - "POST /api/v1/auth/* -> proxy to auth service (直连)"
        - "ALL /api/v1/* (except auth) -> proxy to scheduler service"
    - component: "auth"
      responsibility: "API Key 验证，JWT 签发和刷新，登出，用户信息查询。启动时自动加载 DEFAULT_API_KEYS 预置 key"
      interfaces:
        - "GET /health -> { status: 'ok' }"
        - "POST /api/v1/auth/login(body: {api_key}) -> {token, refresh_token, expires_at, user}"
        - "POST /api/v1/auth/refresh(body: {refresh_token}) -> {token, expires_at} (过期返回 details: {refresh_expired: true})"
        - "POST /api/v1/auth/logout -> {ok: true}"
        - "GET /api/v1/auth/me -> {id, name, role, org_id, permissions}"
    - component: "host"
      responsibility: "通过 API-to-SDK 映射层将外部 API 请求转换为 SDK InstanceCreateRequest 调用。自动生成 workspace_root=/tmp/ohent/{name}-{uuid}，预置默认模板 /tmp/ohent-templates/default/"
      interfaces:
        - "GET /health -> { status: 'ok' }"
        - "GET /internal/agents -> {items, total}"
        - "POST /internal/agents(body: {name, template_id?, agent_config_id?, model, config}) -> {data: {instance}}"
        - "GET /internal/agents/{id} -> {data: {instance}}"
        - "DELETE /internal/agents/{id} -> {ok: true}"
        - "POST /internal/agents/{id}/message(body) -> {data: {result}}"
    - component: "scheduler"
      responsibility: "星型拓扑中心：接收网关请求，统一转发到对应后端服务（含 auth 路由）。骨架阶段转发 agents 到 host"
      interfaces:
        - "GET /health -> { status: 'ok' }"
        - "GET /api/v1/agents -> proxy to host"
        - "POST /api/v1/agents -> proxy to host"
        - "GET /api/v1/agents/{id} -> proxy to host"
        - "DELETE /api/v1/agents/{id} -> proxy to host"
        - "POST /api/v1/agents/{id}/message -> proxy to host"
        - "GET /api/v1/tasks/{task_id} -> {data: {task}}"
        - "/api/v1/auth/* -> proxy to auth (未来扩展)"
    - component: "memory/market/billing"
      responsibility: "骨架阶段仅提供 health endpoint，后续模块化填充"
      interfaces:
        - "GET /health -> { status: 'ok' }"

  dependencies:
    - component: "gateway"
      relationship: "依赖 ohent_shared (JWT 验证), 转发到 auth 和 scheduler"
    - component: "auth"
      relationship: "依赖 ohent_shared (JWT 签发)"
    - component: "scheduler"
      relationship: "依赖 ohent_shared (ServiceClient), 转发到 host/auth/memory/market/billing"
    - component: "host"
      relationship: "依赖 ohent_shared, 依赖 openharness-sdk (OrchestratorClient)"
    - component: "memory/market/billing"
      relationship: "依赖 ohent_shared, 骨架无其他依赖"

  integration_points:
    - "Gateway → Auth 服务: /api/v1/auth/* 路由转发"
    - "Gateway → Scheduler 服务: /api/v1/agents/*, /api/v1/tasks/* 路由转发"
    - "Scheduler → Host 服务: /internal/agents/* 内部调用"
    - "Host → openharness-sdk: OrchestratorClient noop driver 实例管理"
    - "Auth → ohent_shared/security: JWT 签发和验证"

contracts:
  - from_task: "ohent-0-shared"
    to_task: "ohent-2-gateway"
    interface: "ohent_shared.security (JWT 验证函数), ohent_shared.errors (全部 11 个错误码), ohent_shared.responses (响应包装)"
