      核心问题: api-protocol.md 定义 POST /api/v1/agents 请求体为 {name, template_id?, agent_config_id?, model, config}，
      但 SDK InstanceCreateRequest 是 {name, host, template_id, workspace_root, seed: {mode, template_dir, custom_dir?}}。
