    title: "编写全链路 E2E 测试（curl 验证脚本）"
    description: |
      编写 tests/e2e_full_chain.py，验证完整请求链路。
      测试场景:
      1. login: POST /api/v1/auth/login (API Key) → 获取 JWT
      2. me: GET /api/v1/auth/me (带 JWT) → 返回用户信息 (含 permissions)
      3. logout: POST /api/v1/auth/logout (带 JWT) → 返回 ok
      4. agents list: GET /api/v1/agents (带 JWT) → 返回空列表
      5. create agent: POST /api/v1/agents (带 JWT, body={name, template_id, ...}) → 返回实例 (status: ready)
      6. get agent: GET /api/v1/agents/{id} (带 JWT) → 返回实例详情
      7. message agent: POST /api/v1/agents/{id}/message (带 JWT) → 返回消息结果
      8. delete agent: DELETE /api/v1/agents/{id} (带 JWT) → 返回 ok
      9. verify deleted: GET /api/v1/agents → 列表为空
      额外验证:
      - 无 JWT 请求返回 401 + UNAUTHORIZED
      - 过期 JWT 请求返回 401 + UNAUTHORIZED + details: {expired: true}
      - refresh_token 过期返回 details: {refresh_expired: true}
      - 错误响应格式包含 code/message/request_id
      - 每个请求的 request_id 唯一
      - JWT payload 包含 permissions 字段
