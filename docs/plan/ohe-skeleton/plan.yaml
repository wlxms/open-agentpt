    format: "Python 包 (pip install -e)"
  - from_task: "ohent-0-shared-api-mapping"
    to_task: "ohent-2-host"
    interface: "api_to_sdk_mapping 函数: 将外部 API 请求 {name, template_id?, agent_config_id?, model, config} 转换为 SDK InstanceCreateRequest {name, host, template_id, workspace_root, seed}"
    format: "Python 模块 (shared 内或 host 内)"
  - from_task: "ohent-2-auth"
    to_task: "ohent-3-gateway-auth"
