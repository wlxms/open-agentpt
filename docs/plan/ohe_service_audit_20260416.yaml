open_questions:
  - question: "Builder 模块是否由 market 服务承载，还是新建独立服务？"
    context: "api-protocol.md §3.1 定义 /api/v1/builder/* → 市场服务，但当前 market 服务无 builder 代码"
    type: decision_blocker
    affects: ["market", "scheduler"]
  - question: "Org/权限模块是否由 auth 服务承载，还是新建独立服务？"
    context: "api-protocol.md §3.1 定义 /api/v1/org/* → 权限管理服务（认证子模块），当前 auth 服务只有 login/refresh/logout/me"
    type: decision_blocker
    affects: ["auth", "scheduler"]
  - question: "Scheduler 的 Celery broker 是否使用 Redis（require.md §7.3 定义）？"
    context: "shared/redis.py 已就绪，但 scheduler 未集成 Celery"
    type: research
    affects: ["scheduler"]
  - question: "Agent 实例的 SDK runtime 在生产环境是否使用 Podman？"
    context: "当前使用 noop runtime；require.md §7.2 定义使用 Podman 容器运行时"
    type: research
    affects: ["host"]
  - question: "计费费率是否需要数据库存储支持动态配置？"
    context: "当前 _calc_cost 是固定函数；require.md §5.3 提到差异化定价和自定义计费规则"
    type: research
    affects: ["billing"]
  - question: "记忆服务的大文件存储策略（本地文件系统 vs MinIO）何时切换？"
    context: "require.md §7.3 定义开发阶段本地文件系统，生产阶段 MinIO"
    type: nice_to_know
    affects: ["memory"]

gaps:
  - area: "API 路由前缀不一致"
    description: "billing 的实际路由 /internal/billing/usage/* 与 api-protocol.md 定义的 /internal/billing/* 不一致"
    impact: research_blocker
    affects: ["billing", "scheduler"]
  - area: "httpx 连接池缺失"
    description: "gateway 和 scheduler 每次请求创建新 httpx.AsyncClient，生产环境会有性能和文件描述符问题"
    impact: nice_to_know
    affects: ["gateway", "scheduler"]
  - area: "错误处理不统一"
    description: "部分路由使用 OHError+HTTPException，部分使用 error_response+JSONResponse，部分直接 raise RuntimeError"
    impact: nice_to_know
    affects: ["auth", "host", "memory", "market"]
  - area: "ServiceClient 未被使用"
    description: "shared/service_client.py 已实现但各服务自行创建 httpx.AsyncClient"
    impact: nice_to_know
    affects: ["scheduler", "shared"]
