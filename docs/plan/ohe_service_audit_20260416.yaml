testing_patterns:
  framework: "pytest + httpx.AsyncClient + ASGITransport（模拟 FastAPI 请求）"
  coverage_areas:
    - "各服务 health 端点"
    - "auth: login/refresh/me/logout（正常+错误）"
    - "host: CRUD + send_message + not_found"
    - "market: templates/skills/mcps 列表 + 详情 + 分页 + 筛选"
    - "memory: CRUD + path 过滤 + update"
    - "billing: summary + records + 筛选 + 分页"
    - "gateway: middleware（auth/no-auth/expired/invalid/upstream-error）"
    - "scheduler: proxy 路由转发 + task status"
    - "shared: errors/responses/security/schemas"
    - "api_mapping: InstanceMapper 创建/模板映射"
    - "sdk_noop: SDK noop driver 端到端"
    - "E2E: gateway→scheduler→auth/host 全链路"
    - "integration: 跨服务访问（market/billing/memory via gateway）"
  test_count_by_file:
    test_shared: "~20 tests"
    test_auth: "11 tests"
    test_host: "11 tests"
    test_market: "11 tests"
    test_memory: "11 tests"
    test_billing: "9 tests"
    test_gateway: "7 tests"
    test_scheduler: "~10 tests"
    test_health_*: "7 files × 1 test = 7 tests"
    test_api_mapping: "5 tests"
    test_sdk_noop: "2 tests"
    test_e2e_full_chain: "8 tests (marked e2e)"
    test_integration: "3 tests (marked integration)"
  total_tests: "~123"
  mock_patterns:
    - "unittest.mock.patch 替换 httpx.AsyncClient（gateway/scheduler 测试）"
    - "模块级 _service=None 重置单例（host/market/memory 测试）"
    - "autouse fixture 初始化种子数据（auth/billing 测试）"

testing_gaps:
  missing_boundary_tests:
    - "空字符串/空列表输入验证（所有服务）"
    - "超长字符串输入（name 超过 255 字符等）"
    - "特殊字符/SQL 注入/XSS 输入"
    - "page=0 或 page=-1 或 page_size=0 等非法分页参数"
    - "超大 page_size（>100）"
    - "path traversal 攻击（../../../etc/passwd）"
    - "并发请求竞争条件（同一资源同时更新）"
  missing_error_path_tests:
    - "数据库连接失败场景"
    - "Redis 连接失败场景"
    - "下游服务超时（当前只测了 connection refused）"
    - "无效 JSON body 格式"
    - "缺少必填字段（如 login 不传 api_key）"
    - "重复创建（CONFLICT 错误码）"
  missing_security_tests:
    - "伪造 JWT（篡改 payload）"
    - "过期 refresh token"
    - "跨租户访问（user A 访问 user B 的资源）"
    - "权限不足访问（FORBIDDEN 错误码）"
    - "API Key 泄露/暴力破解"
  missing_service_specific_tests:
    auth:
      - "API Key 为空字符串"
      - "同时多次 refresh 同一个 token"
