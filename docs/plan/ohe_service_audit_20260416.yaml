# ==================================================================
# 二、API 端点实现对照表
# ==================================================================

patterns_found:
  - category: architecture
    pattern: 所有服务使用内存 dict/list 存储，无真实数据库
    description: "每个服务的数据存储都是 Python 内存数据结构（dict/list），进程重启即丢失。shared/db.py 和 shared/redis.py 已准备好但未被任何服务使用。"
    examples:
      - file: services/auth/src/ohent_auth/service.py
        location: services/auth/src/ohent_auth/service.py:7
        snippet: '_API_KEYS: dict[str, dict] = {}'
      - file: services/memory/src/ohent_memory/service.py
        location: services/memory/src/ohent_memory/service.py:7
        snippet: 'self._assets: dict[str, dict[str, Any]] = {}'
      - file: services/billing/src/ohent_billing/service.py
        location: services/billing/src/ohent_billing/service.py:61
        snippet: 'self._records = [self._enrich(r) for r in (records or [])]'
    prevalence: common

  - category: architecture
    pattern: 网关→调度→后端 三层代理架构
    description: "Gateway 解析 JWT 后转发到 Scheduler，Scheduler 根据 ROUTE_TABLE 转发到后端服务。所有代理使用 httpx.AsyncClient，每次请求创建新连接（无连接池）。"
    examples:
      - file: services/gateway/src/ohent_gateway/middleware.py
        location: services/gateway/src/ohent_gateway/middleware.py:121-155
        snippet: 'async with httpx.AsyncClient(timeout=30.0) as client:'
      - file: services/scheduler/src/ohent_scheduler/proxy.py
        location: services/scheduler/src/ohent_scheduler/proxy.py:49-76
        snippet: 'async with httpx.AsyncClient(timeout=30.0) as client:'
    prevalence: common

  - category: architecture
    pattern: 内部路由使用 /internal/ 前缀
    description: "后端服务暴露 /internal/* 路由，Scheduler 代理将 /api/v1/* 重写为 /internal/* 后转发。"
    examples:
      - file: services/scheduler/src/ohent_scheduler/proxy.py
        location: services/scheduler/src/ohent_scheduler/proxy.py:6-12
        snippet: 'ROUTE_TABLE: dict[str, tuple[str, str]] = { "/api/v1/auth": (AUTH_URL, "/internal/auth"), ... }'
    prevalence: common

  - category: naming
    pattern: 全局单例模式（模块级变量 + get_xxx 函数）
    description: "每个服务使用模块级 _service 变量和 get_service() 函数管理单例。"
    examples:
      - file: services/host/src/ohent_host/api/v1/agents.py
        location: services/host/src/ohent_host/api/v1/agents.py:8-13
        snippet: '_service: HostService | None = None\ndef get_service() -> HostService:'
    prevalence: common

  - category: error_handling
    pattern: 混合使用 OHError+HTTPException 和 error_response+JSONResponse
    description: "部分路由使用 OHError 生成 HTTPException，部分直接返回 JSONResponse。不统一。"
    examples:
      - file: services/host/src/ohent_host/api/v1/agents.py
