patterns_found:
- category: architecture
  pattern: Star topology with proxy-based scheduler
  description: "Gateway → Scheduler (dumb proxy) → Backend services. Scheduler currently does zero business orchestration."
  examples:
  - file: scheduler/proxy.py
    location: proxy.py:8-16
    snippet: "ROUTE_TABLE: dict[str, tuple[str, str]] = { ... }"
  prevalence: common

- category: structure
  pattern: Internal API prefix convention
  description: "All backend services expose /internal/{service}/* endpoints, scheduler maps /api/v1/{service} → /internal/{service}"
  examples:
  - file: scheduler/proxy.py
    location: proxy.py:8-16
    snippet: '"/api/v1/auth": (AUTH_URL, "/internal/auth")'
  prevalence: common

- category: error_handling
  pattern: Service-specific error exception + error_response
  description: "Each service defines its own Error exception (AuthError, HostError, BillingError, MemoryError) with code/message/status_code"
  examples:
  - file: auth/service.py
    location: service.py:30-40
    snippet: "class AuthError(Exception): def __init__(self, code, message, ...)"
  prevalence: common

- category: structure
  pattern: Seed data on startup
  description: "Services seed default data during lifespan startup (auth seeds root org + admin user, memory seeds sample assets, billing seeds usage records)"
  examples:
  - file: auth/main.py
    location: main.py:11-13
    snippet: "async with async_session_factory() as db: await service.seed_default_data(db)"
  prevalence: common

- category: structure
  pattern: Singleton service instance per module
  description: "Services use module-level singleton (_service = None, get_service() returns or creates)"
  examples:
  - file: host/api/v1/agents.py
    location: agents.py:15-20
    snippet: "_service: HostService | None = None; def get_service() -> HostService: ..."
  prevalence: common

- category: data_access
  pattern: Direct DB access per service (no shared data proxy)
  description: "Each service connects directly to PostgreSQL via shared db.py factory. Memory service is NOT a general DB proxy per require.md §9.1.2."
  examples:
  - file: shared/db.py
    location: db.py:1-15
    snippet: "engine = create_async_engine(db_settings.url, ...)"
  prevalence: universal

