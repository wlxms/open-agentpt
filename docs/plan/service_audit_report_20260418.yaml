related_conventions:
  naming_patterns_in_domain: "Service packages: agentp_{name}. Internal routes: /internal/{name}/*. Models in shared/models.py. Settings per-service via pydantic-settings with ENV_PREFIX."
  structure_of_domain: "Each service: src/agentp_{name}/ with main.py, service.py, api/v1/, config.py, schemas.py (optional). Tests in top-level tests/ directory."
  error_handling_in_domain: "Service-specific error exceptions (AuthError, HostError, etc.) mapped to error codes. OHError/error_response from shared lib. JSONResponse with error body."
  testing_in_domain: "pytest with conftest.py. Per-service health + unit tests. E2E full-chain test. Mark: @pytest.mark.e2e"
  documentation_in_domain: "require.md (full spec), api-protocol.md (API contract), PRD.yaml (project tracking)"

related_dependencies:
