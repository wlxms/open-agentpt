  - component: agentp_shared
    relationship_to_domain: "All services depend on it for models, config, db, security"
    direction: inbound
  - component: agent-orchestrator (SDK submodule)
    relationship_to_domain: "Host service imports OrchestratorClient and contracts"
    direction: inbound
  external:
  - name: PostgreSQL 16
    purpose_for_domain: "Primary database for all structured data"
  - name: Redis 7
    purpose_for_domain: "Token blacklist, event bus (unused), Celery broker (not configured)"

domain_security_considerations:
  sensitive_areas:
  - area: JWT secret key
    location: shared/config.py:33
    concern: "Hardcoded default: 'agentp-dev-secret-key-change-in-production' - must override via AGENTP_JWT_SECRET_KEY env var"
  - area: API Key hashing
    location: auth/service.py:42-44
    concern: "SHA-256 hash used for storage - appropriate, not reversible"
  - area: Admin API key
    location: auth/service.py:660-680
    concern: "Default admin key 'oh-admin-key-default' seeded on startup - must be changed for production"
  - area: No RBAC enforcement
    location: auth/api/v1/auth.py
    concern: "Endpoints do not check user role/permissions - any valid JWT can access any endpoint"
  authentication_patterns_in_domain: "API Key → JWT exchange. JWT validated at gateway. X-Internal-Call header for service-to-service."
  authorization_patterns_in_domain: "Token payload contains role/permissions but NO enforcement middleware exists"
  data_validation_in_domain: "Pydantic schemas for request validation. SQLAlchemy for DB constraints."

