open_questions:
- question: "Should the scheduler remain a pure proxy or evolve into a BFF with business orchestration?"
  context: "require.md §6 describes scheduler as 'central nervous system' with approval workflows, lifecycle management, config center. Current implementation is a dumb proxy."
  type: decision_blocker
  affects: ["scheduler-refactor", "approval-workflow", "lifecycle-management"]
- question: "Should market service persist to PostgreSQL or stay in-memory?"
  context: "Market is currently in-memory with hardcoded data. api-protocol §4.3 defines a full Agent Config builder with versioning, publishing, import/export."
  type: decision_blocker
  affects: ["market-persistence", "agent-config-builder"]
- question: "When should Celery be integrated?"
  context: "require.md §6.4 describes Celery for async tasks (idle recycling, billing reports, health checks). PRD marks it as out-of-scope for skeleton stage."
  type: decision_blocker
  affects: ["celery-integration", "scheduled-tasks", "async-operations"]
- question: "Should event bus be activated immediately?"
  context: "EventBus is fully implemented in shared but no service publishes or subscribes to events."
  type: research
  affects: ["event-bus-activation", "host-event-publishing", "billing-event-consumption"]
- question: "Is rate limiting needed before production?"
  context: "require.md §7.4 defines multi-dimensional rate limiting. PRD marks it out-of-scope for skeleton."
  type: nice_to_know
  affects: ["gateway-rate-limiting"]

gaps:
# ==========================================================================
# CRITICAL GAPS (blocks core functionality)
# ==========================================================================
- area: Scheduler - No business orchestration
  description: "Scheduler is a dumb HTTP proxy. Missing: service discovery, approval workflow, instance lifecycle management, configuration center, task scheduling. require.md §6.1-6.7 describes all of these."
  impact: decision_blocker
  affects: ["scheduler-refactor", "approval-workflow", "config-center"]

- area: Celery - Not integrated
  description: "No tasks.py or beat_schedule.py exists. require.md §9.1.1 defines Celery for async/scheduled tasks (idle recycling, billing reports, health checks). PRD out_of_scope for skeleton, but needed for Phase 2+."
  impact: decision_blocker
  affects: ["celery-integration", "scheduled-tasks"]

- area: Market - No database persistence
  description: "Market service uses in-memory lists with hardcoded seed data. No PostgreSQL tables for templates/skills/mcps. Data lost on restart."
  impact: decision_blocker
  affects: ["market-persistence", "market-tables"]

- area: Agent Config Builder - Completely missing
  description: "api-protocol §4.3 defines 11 endpoints for Agent Config CRUD, versioning, publishing, importing, exporting, validation, preview. None implemented. This is a major feature for enterprise users."
  impact: decision_blocker
  affects: ["agent-config-builder", "market-service"]

# ==========================================================================
# HIGH PRIORITY GAPS (important features missing)
# ==========================================================================
- area: Event Bus - Implemented but unused
  description: "EventBus with Redis Streams is fully coded in shared/event_bus.py but NO service imports or initializes it. No agent.created, agent.destroyed, agent.usage events are published or consumed."
  impact: research_blocker
  affects: ["event-bus-activation", "host-events", "billing-events"]

- area: RBAC - No enforcement
  description: "JWT payload contains role and permissions, but no middleware or decorator enforces them. Any authenticated user can access any endpoint including admin-only operations."
  impact: research_blocker
  affects: ["rbac-enforcement", "auth-middleware"]

- area: Host - Missing advanced operations
  description: "Missing per api-protocol §4.2: restart, batch-restart, batch-destroy, command execution, skill installation, MCP configuration, config modification, monitor data, memory sync (upload/download/tree). Currently only basic CRUD + send_message."
  impact: research_blocker
  affects: ["host-advanced-ops", "skill-management", "mcp-management"]

- area: Billing - Missing budget and export
  description: "Missing per api-protocol §4.5: budget management (GET/PUT /billing/budget), CSV export (GET /billing/export), alert rules. BillingRule model exists but no API to manage rules. Cost calculation is hardcoded, not rule-driven."
  impact: research_blocker
  affects: ["billing-budget", "billing-export", "billing-rules-api"]

- area: Memory - No binary/file support
  description: "Memory service stores content in JSONB metadata_ column. No file system or object storage integration. Missing: multipart upload (PUT), keyword search (GET /search), file streaming, binary content support."
  impact: research_blocker
  affects: ["memory-binary", "memory-search", "memory-storage"]

- area: Auth - Missing member management endpoints
  description: "Missing per api-protocol §4.6: POST org/{id}/members (add member), DELETE org/{id}/members/{user_id} (remove), PUT org/{id}/members/{user_id} (modify role), POST api-keys/{key_id}/renew, GET /permissions, GET /roles, PUT /roles/{id}."
  impact: research_blocker
  affects: ["auth-member-mgmt", "auth-role-mgmt"]

- area: Gateway - No rate limiting
  description: "require.md §7.4 defines multi-dimensional rate limiting (global, org-level, user-level, endpoint-level). Not implemented. PRD marks out-of-scope for skeleton."
  impact: nice_to_know
  affects: ["gateway-rate-limiting"]

# ==========================================================================
# MEDIUM PRIORITY GAPS (nice-to-have features)
# ==========================================================================
- area: Gateway - No CORS middleware
  description: "require.md §7.1 mentions CORS. Not configured in gateway."
  impact: nice_to_know
  affects: ["gateway-cors"]

- area: Gateway - No request logging/audit
  description: "require.md §7.5 requires full request logging and audit trail. Not implemented."
  impact: nice_to_know
  affects: ["gateway-audit"]

- area: Gateway - No WebSocket support
  description: "require.md §7.1 reserves WebSocket for streaming. api-protocol §1.6 defines ws:// endpoint. Not implemented. PRD out_of_scope."
  impact: nice_to_know
  affects: ["gateway-websocket"]

- area: Frontend - Not implemented
  description: "No frontend/ directory exists. PRD marks frontend as out_of_scope for current phase."
  impact: nice_to_know
  affects: ["frontend-implementation"]

- area: Service discovery - Hardcoded URLs
  description: "Service URLs hardcoded in shared/config.py. No dynamic registration/health check/auto-removal."
  impact: nice_to_know
  affects: ["service-discovery"]

- area: Process pool model - Not implemented for Host
  description: "require.md §9.3.2 describes multi-process worker pool with independent OrchestratorClient per worker. Current host runs single-process."
  impact: nice_to_know
  affects: ["host-process-pool"]

- area: Memory service - No search endpoint
  description: "api-protocol §4.8 defines GET /memory/search with keyword filtering. Not implemented."
  impact: nice_to_know
  affects: ["memory-search"]

# ==========================================================================
# SERVICE-BY-SERVICE SUMMARY
# ==========================================================================
# shared:    ████████████████████ 95% - Complete, only unused event bus
# auth:      ██████████████████░░ 80% - Missing member/role management, no RBAC enforcement
# host:      ██████████████░░░░░░ 55% - Basic CRUD + send_message, missing advanced ops
# billing:   ██████████████░░░░░░ 50% - Records + summary, missing budget/export/rules
# memory:    █████████████░░░░░░░ 45% - Basic CRUD, no binary/search/storage
# gateway:   ████████████░░░░░░░░ 40% - JWT + forwarding, no rate limit/CORS/audit
# scheduler: ██████░░░░░░░░░░░░░░ 20% - Dumb proxy only, no orchestration
