    relationship_to_domain: "Central routing hub - currently stateless proxy only"
  - component: Auth Service
    responsibility: API Key auth, JWT lifecycle, org/user/key management
    location: services/auth/src/agentp_auth/
    relationship_to_domain: "Most complete service, handles auth + org management"
  - component: Host Service
